name: gate-a

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  # Lake's mathlib cache archives live outside .lake by default
  # ($HOME/.cache/mathlib). Put them under .lake so the Namespace cache volume
  # persists both the unpacked oleans and the .ltar archives.
  MATHLIB_CACHE_DIR: ${{ github.workspace }}/.lake/mathlib-cache

concurrency:
  group: gate-a-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Always runs and always reports — a path-filtered required check would
  # leave non-Lean PRs permanently blocked on an "expected" status
  # (SPEC-006-B). Detection is a job so `gate-a` itself can short-circuit.
  detect:
    runs-on: ubuntu-latest
    outputs:
      lean: ${{ steps.filter.outputs.lean }}
      active: ${{ steps.filter.outputs.active }}
      archive: ${{ steps.filter.outputs.archive }}
      benchmark: ${{ steps.filter.outputs.benchmark }}
      admitted: ${{ steps.admission.outputs.admitted }}
      prepare_profile: ${{ steps.profiles.outputs.prepare }}
      audit_profile: ${{ steps.profiles.outputs.audit }}
      replay_profile: ${{ steps.profiles.outputs.replay }}
      archive_profile: ${{ steps.profiles.outputs.archive }}
      prepare_volume: ${{ steps.profiles.outputs.prepare_volume }}
      audit_volume: ${{ steps.profiles.outputs.audit_volume }}
      replay_volume: ${{ steps.profiles.outputs.replay_volume }}
      archive_volume: ${{ steps.profiles.outputs.archive_volume }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            lean:
              - 'library/**'
              - 'goals/**/*.lean'
              - 'packages/unsorry-archive-*/**'
              - 'targets/*/_verify/**'
              - 'lakefile.toml'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'AxiomAudit/**'
              - 'AuditFixtures/**'
              - 'tools/gate_a/**'
              - '.github/workflows/gate-a.yml'
            active:
              - 'library/**'
              - 'goals/**/*.lean'
              - 'lakefile.toml'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'AxiomAudit/**'
              - 'AuditFixtures/**'
              - 'tools/gate_a/**'
              - '.github/workflows/gate-a.yml'
            archive:
              - 'packages/unsorry-archive-*/**'
            benchmark:
              - 'targets/*/_verify/**'
      - id: admission
        env:
          CREATED_AT: ${{ github.event.pull_request.created_at }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 -m tools.repo.pr_admission env \
            --created-at "$CREATED_AT" \
            --head-ref "$HEAD_REF" \
            --title "$TITLE" >> "$GITHUB_OUTPUT"
      # Route by Gate A job role (ADR-058): prepare/build, audit, and replay use
      # separate Namespace profiles so the operator can scale each bottleneck
      # independently. Replay keeps the larger memory lane; prepare/archive stay
      # on the cheap build lane; audit has its own serial axiom-audit lane.
      - id: profiles
        run: |
          # Single shared lane (was per-stage prepare/audit/replay, ADR-058):
          # keeping three lanes populated by hand kept leaving a lane at zero
          # runners, which hangs the whole run (a stage with no runner queues
          # forever) and stalls every merge. Route all Gate A stages to one pool
          # so any Namespace runner serves any stage regardless of workload mix —
          # the operator maintains exactly ONE label: namespace-profile-unsorry-1.
          prepare=namespace-profile-unsorry-1
          audit=namespace-profile-unsorry-1
          replay=namespace-profile-unsorry-1
          archive=namespace-profile-unsorry-1

          echo "prepare=$prepare" >> "$GITHUB_OUTPUT"
          echo "audit=$audit" >> "$GITHUB_OUTPUT"
          echo "replay=$replay" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

          # Failsafe (ADR-046): the .lake cache volume engages ONLY on a Namespace
          # profile. If a runner is ever changed to a non-Namespace label, its
          # volume output is false and that job falls back to GitHub caches.
          for key in prepare audit replay archive; do
            eval label="\$$key"
            case "$label" in
              namespace-*) value=true ;;
              *)                     value=false ;;
            esac
            echo "${key}_volume=$value" >> "$GITHUB_OUTPUT"
          done

  gate_a_prepare:
    name: gate-a-prepare
    needs: detect
    # Namespace managed prepare lane (ADR-058). This job warms/restores the Lean
    # cache, generates binding modules, and runs the cheap authoritative checks
    # once before the audit/replay jobs start in parallel.
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.lean == 'true'
    runs-on: ${{ needs.detect.outputs.prepare_profile }}
    # 45 min, not 30: a COLD library build (~21 min and growing — no warm
    # `.lake/build` cache, e.g. first run on a new cache prefix after a
    # toolchain/mathlib bump) plus the cheap checks overran the old 30-min cap
    # and the job was killed (#573). The ADR-045 cache keeps the warm path to
    # ~minutes; this only adds headroom for the rare cold path.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: persist the local UnsorryLibrary oleans (.lake/build) across
      # runs so `lake build UnsorryLibrary` is incremental — only changed
      # modules recompile instead of the whole library cold-building (~16-21 min)
      # in every job. The key invalidates on any toolchain / mathlib / lakefile
      # change (forcing a full cold rebuild); otherwise restore-keys restores the
      # most recent oleans. Same gate-a run: prepare saves under the commit sha
      # and the audit/replay jobs (which `need` prepare) restore that exact key,
      # so the library builds ONCE per run, not three times. Soundness is
      # unchanged — Lake's content-hash traces recompile any changed source, and
      # the axiom audit + leanchecker kernel replay still validate every olean
      # that reaches main (incremental on the pushed diff, plus the scheduled
      # gate-a-full-replay backstop — ADR-048 Phase 2), cached or not.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.prepare_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.prepare_volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          if [ "${{ steps.ns_lake_cache.outputs.cache-hit }}" != "true" ]; then
            echo "::warning::Namespace .lake cache MISS on this profile — Gate A cold-builds mathlib + the library (slow, #1921). Check the volume is attached (ADR-046)."
          fi
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # GitHub-cache fallback for the local oleans — NON-Namespace only. On a
      # Namespace profile the .lake cache volume (ADR-046) already persists
      # .lake/build across jobs and runs, so this GitHub cache is pure churn there:
      # a ~320 MB per-commit entry (keyed on github.sha) that thrashes the 10 GB
      # repo cache. Gating it to volume!='true' keeps the cache small. On Namespace
      # the warm volume makes audit/replay's library build a cheap incremental
      # instead — the #801 exact-key build-skip just doesn't fire there.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        if: needs.detect.outputs.prepare_volume != 'true'
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # ADR-018: goal statements are create-only — the pin against history.
      # Every other layer (binding regeneration, Gate B shas) derives from
      # goals/<id>.lean in THIS tree, so same-PR consistent tampering passes
      # them all (#190 CRITICAL). Runs before the build: cheap, and a
      # tampering PR must die fast. Any goals/*.lean change sets detect.lean,
      # so the gate cannot be short-circuited around.
      - name: Goal statements are create-only (ADR-018)
        if: github.event_name == 'pull_request' && needs.detect.outputs.active == 'true'
        run: |
          python3 -m tools.gate_a.check_goal_immutability \
            --base "${{ github.event.pull_request.base.sha }}"

      - name: Build (lean-action, mathlib binary cache)
        if: needs.detect.outputs.active == 'true'
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.prepare_volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      # ADR-011 statement binding: Gate A REGENERATES the binding obligation for
      # every proved goal from the goal's own statement, so a contributor can
      # neither weaken nor omit it. The --wfail build below then type-checks the
      # obligations — a proof of a weakened/vacuous statement under the goal's
      # name fails to inhabit the goal type and goes red. (#64 class.)
      - name: Generate statement-binding obligations
        if: needs.detect.outputs.active == 'true'
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        if: needs.detect.outputs.active == 'true'
        run: lake build UnsorryLibrary --wfail

      # Publish the freshly-built library oleans as a GitHub-cache fallback so the
      # downstream audit/replay SHARDS (ADR-063/091) can RESTORE them when they land
      # on a cold Namespace runner. Measured 2026-06-22: in a single run
      # gate-a-prepare mounted a warm 20 GB .lake while gate-a-audit got an empty
      # 4 KB one and cold-rebuilt the whole library (~45 min, hit the timeout) — the
      # .lake volume is per-runner and is NOT reliably shared to the downstream jobs.
      # The library oleans compress to ~320 MB, so this restores in well under a
      # minute. Published on PRs too (ADR-094, #5751), not just main: a PR's shards
      # share this run's github.sha, so they get an EXACT-key restore hit on what
      # prepare just built — `--wfail` becomes an incremental no-op instead of the
      # cold rebuild that produced the 1077 s shard tail (#5678). Forks are skipped
      # (read-only token cannot write the cache). Save-only here; continue-on-error
      # keeps it non-gating, so a failed/evicted save degrades to the prefix
      # restore-key (today's behaviour) — a strict superset. The non-Namespace lane
      # below still round-trips via actions/cache as before. Soundness unchanged —
      # leanchecker re-checks every olean it loads against the kernel, and lake
      # rebuilds any restored olean whose source changed.
      - name: Publish library oleans to fallback cache (ADR-045/094)
        if: needs.detect.outputs.active == 'true' && needs.detect.outputs.prepare_volume == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}

      - name: Audit self-test (gate cannot rot silently)
        if: needs.detect.outputs.active == 'true'
        run: ./tools/gate_a/test_audit.sh

      # Authoritative for the autoImplicit vector: the build/audit/leanchecker
      # all PASS a vacuous theorem enabled by `set_option autoImplicit true`
      # (it is sound, just meaningless), so for this vector the scan IS the bar.
      # Whole-file + whitespace-collapsed, so line-splitting cannot evade it
      # (W3 red-team PR #64). Self-tested by tools/gate_a/tests/.
      - name: Forbidden elaboration options in library
        if: needs.detect.outputs.active == 'true'
        run: python3 -m tools.gate_a.check_library_options library

      # Archive-package validation moved to its own job (gate-a-archive): each
      # archive package is a separate Lake project that leanchecker-replays its
      # own mathlib image, which OOM'd when run inside this job's headroom (#764).

      - name: Textual lint on library diff (belt only — the audit is the bar)
        if: github.event_name == 'pull_request' && needs.detect.outputs.active == 'true'
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          added=$(git diff "$base"...HEAD -- library/ | grep '^+' | grep -v '^+++' || true)
          if echo "$added" | grep -nE '\b(sorry|admit|sorryAx|native_decide|axiom|unsafe|implemented_by|extern)\b'; then
            echo "::error::forbidden token added under library/ (see lines above)"
            exit 1
          fi

  # ADR-091: plan the axiom audit into N disjoint shards. Reads source + the PR
  # diff only (no build), like gate_a_replay_plan, so it's a fast ubuntu job that
  # drives the audit matrix below. count==0 (no changed library/goal module) →
  # empty matrix → the audit matrix is skipped and gate_a_audit_cover passes
  # vacuously. Shard count N is `vars.UNSORRY_AUDIT_SHARDS` (operator capacity
  # knob, default 8; separate from UNSORRY_REPLAY_SHARDS).
  gate_a_audit_plan:
    name: gate-a-audit-plan
    # ADR-097: the real axiom_audit now runs ONLY as the fallback — when
    # gate_a_nanoda did NOT cover this PR (non-leaf / global-impact / untrusted
    # diff). On the common leaf path nanoda covers it and these jobs skip.
    needs: [detect, gate_a_prepare, gate_a_nanoda]
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true' && needs.gate_a_nanoda.outputs.covered != 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Plan audit shards (ADR-091)
        id: plan
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
          SHARDS: ${{ vars.UNSORRY_AUDIT_SHARDS || '8' }}
        run: |
          set -euo pipefail
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            out=$(python3 -m tools.gate_a.parallel_modules plan-audit --shards "$SHARDS")
          else
            out=$(python3 -m tools.gate_a.parallel_modules plan-audit --shards "$SHARDS" --base "$BASE_SHA")
          fi
          echo "plan: $out"
          echo "matrix=$(printf '%s' "$out" | python3 -c 'import sys,json;print(json.dumps(json.load(sys.stdin)["shards"]))')" >> "$GITHUB_OUTPUT"
          echo "count=$(printf '%s' "$out" | python3 -c 'import sys,json;print(json.load(sys.stdin)["count"])')" >> "$GITHUB_OUTPUT"

  gate_a_audit:
    name: gate-a-audit
    needs: [detect, gate_a_prepare, gate_a_nanoda, gate_a_audit_plan]
    # ADR-091: one matrix leg per audit shard. Skip when no library/goal module
    # changed (count==0) — the empty matrix expands to zero legs; the cover job
    # then passes vacuously. Each leg restores gate-a-prepare's oleans and audits
    # its disjoint shard, so every module is still axiom-audited exactly once.
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true' && needs.gate_a_nanoda.outputs.covered != 'true' && needs.gate_a_audit_plan.outputs.count != '0'
    runs-on: ${{ needs.detect.outputs.audit_profile }}
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.gate_a_audit_plan.outputs.matrix) }}
    # 45 min, not 30: this job also does the cold library build (~21 min) before
    # its audit shard; the old 30-min cap killed it on a cold cache (#567).
    # See gate-a-prepare and ADR-045.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: restore the library oleans gate-a-prepare just built (exact-key
      # hit on the commit sha) so this job's library build is a near-no-op rather
      # than a second cold ~16-21 min rebuild. See gate-a-prepare for the full
      # rationale and the soundness argument.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.audit_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.audit_volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          if [ "${{ steps.ns_lake_cache.outputs.cache-hit }}" != "true" ]; then
            echo "::warning::Namespace .lake cache MISS on this profile — Gate A cold-builds mathlib + the library (slow, #1921). Check the volume is attached (ADR-046)."
          fi
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # Cold-volume fallback (ADR-045): when the Namespace .lake volume MISSED
      # (measured: audit can get an empty 4 KB volume even when prepare was warm
      # in the SAME run — the volume is per-runner, not shared), RESTORE the
      # library oleans gate-a-prepare published on main. This turns the --wfail
      # build below from a ~21-min cold rebuild into a cheap incremental. Restore
      # ONLY — never writes the cache (no per-PR churn). leanchecker still
      # kernel-re-checks every olean; lake rebuilds any whose source changed.
      - name: Fallback restore of library oleans on a cold volume (ADR-045)
        if: needs.detect.outputs.audit_volume == 'true' && steps.ns_lake_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # GitHub-cache fallback for the local oleans — NON-Namespace only. On a
      # Namespace profile the .lake cache volume (ADR-046) already persists
      # .lake/build across jobs and runs, so this GitHub cache is pure churn there:
      # a ~320 MB per-commit entry (keyed on github.sha) that thrashes the 10 GB
      # repo cache. Gating it to volume!='true' keeps the cache small. On Namespace
      # the warm volume makes audit/replay's library build a cheap incremental
      # instead — the #801 exact-key build-skip just doesn't fire there.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        if: needs.detect.outputs.audit_volume != 'true'
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      - name: Build (lean-action, mathlib binary cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.audit_volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      - name: Generate statement-binding obligations
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        # Skip when the .lake/build cache hit on the exact commit-sha key:
        # gate-a-prepare already built and --wfail-checked these exact oleans this
        # run, and the axiom audit / leanchecker only LOAD oleans (`lake exe` /
        # `lake env`, never a library `lake build` — axiom_audit is a standalone
        # lean_exe, leanchecker runs under `lake env`), so rebuilding here was pure
        # waste (~3.5 min/job, the gate's biggest constant cost). Self-healing:
        # on a cache miss the build runs. Soundness unchanged — leanchecker
        # re-checks every olean it loads against the kernel regardless of origin.
        if: steps.lake_build_cache.outputs.cache-hit != 'true'
        run: lake build UnsorryLibrary --wfail

      # Incremental on PRs AND on push to main (ADR-048 Phase 2): audit only the
      # changed library modules plus their reverse-import closure, and changed
      # goals. Unchanged declarations were already audited on main. BASE_SHA is
      # github.event.before on a push (the previous main tip — diff = exactly the
      # merged change), pull_request.base.sha on a PR, empty otherwise. A zero-SHA
      # (first push / branch creation) or empty BASE_SHA runs the FULL audit as
      # the backstop; gate/tooling changes also fall back to full (forces_full_audit).
      # ADR-091: this leg audits its DISJOINT shard of that scope, serially within
      # the shard (one ~6-7 GB axiom_audit process at a time); cross-runner
      # parallelism is the matrix. Each leg re-derives its slice from the shared
      # SHA, so no module list crosses a job boundary (inputs stay locally-derived).
      - name: Axiom audit shard ${{ matrix.shard }} (ADR-091)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
          SHARDS: ${{ vars.UNSORRY_AUDIT_SHARDS || '8' }}
        run: |
          set -euo pipefail
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.parallel_modules audit-shard \
              --shard-index ${{ matrix.shard }} --shard-total "$SHARDS" \
              --output "axiom-report-shard-${{ matrix.shard }}.json"
          else
            python3 -m tools.gate_a.parallel_modules audit-shard \
              --shard-index ${{ matrix.shard }} --shard-total "$SHARDS" \
              --output "axiom-report-shard-${{ matrix.shard }}.json" --base "$BASE_SHA"
          fi

      # Diagnostic only — the per-shard footprint fragment (an OUTPUT, never a
      # trusted input; the authoritative audit already ran in the step above). The
      # required gate deliberately never pulls these fragments back in (the
      # SPEC-049-A §2 no-artifact-into-the-gate guard, enforced by the conformance
      # suite); the combined footprint comment lives in the shard pilot instead.
      - name: Upload axiom footprint fragment (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: axiom-report-shard-${{ matrix.shard }}
          path: axiom-report-shard-${{ matrix.shard }}.json

  # ADR-091: the audit matrix's coverage assert and the single signal the
  # aggregator reads for the axiom audit. split_evenly partitions the target set
  # disjoint+covering (unit-tested), so with fail-fast:false the matrix is
  # 'success' only when every leg is green ⟺ every module audited exactly once.
  # Fails closed on a planner failure or any non-green shard; passes vacuously
  # when count==0 (no change → audit matrix skipped). It deliberately never pulls
  # the per-shard footprints back in — that would breach the SPEC-049-A §2
  # no-artifact-into-the-gate guard the conformance suite enforces; the fragments
  # stay uploaded as diagnostics and the combined footprint comment lives in the
  # non-required shard pilot.
  gate_a_audit_cover:
    name: gate-a-audit-cover
    needs: [detect, gate_a_nanoda, gate_a_audit_plan, gate_a_audit]
    # Runs only on the fallback path (nanoda did not cover); skips on the leaf path.
    if: always() && needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true' && needs.gate_a_nanoda.outputs.covered != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Assert every shard audited green
        env:
          COUNT: ${{ needs.gate_a_audit_plan.outputs.count }}
          PLAN_RESULT: ${{ needs.gate_a_audit_plan.result }}
          AUDIT_RESULT: ${{ needs.gate_a_audit.result }}
        run: |
          set -euo pipefail
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "::error::gate-a-audit-plan concluded '$PLAN_RESULT' — cannot trust the shard plan"
            exit 1
          fi
          if [ "$COUNT" = "0" ]; then
            echo "no changed library or goal modules — nothing to audit (matrix skipped)"
            exit 0
          fi
          if [ "$AUDIT_RESULT" != "success" ]; then
            echo "::error::audit matrix result='$AUDIT_RESULT' — a shard failed or was skipped; coverage NOT proven"
            exit 1
          fi
          echo "all $COUNT module(s) audited across the shards (every module audited exactly once)"

  # ADR-097 (Phase 3b): the nanoda audit-replacement. For a leaf-proof PR
  # (compute_audit_targets mode != 'full') this REPLACES the 8-shard axiom_audit
  # above — one runner runs a declaration-scoped lean4export + nanoda over the
  # changed library closure with the axiom whitelist HARD-enforced (a sneaked
  # sorryAx fails) + the pp_declars positive control, in ~seconds. It outputs
  # `covered`; the audit jobs above run ONLY when this is 'false' (the non-leaf /
  # global-impact fallback), so on the common leaf path the 8 audit shards are
  # skipped (the throughput win). leanchecker replay stays p=1 (untouched); the
  # daily full axiom_audit backstop (ADR-048) still catches any nanoda miss.
  # FAIL-CLOSED: coverage is decided cheaply (no build) first; the heavy check
  # runs only when covered; a covered proof that fails nanoda fails this job.
  gate_a_nanoda:
    name: gate-a-nanoda
    needs: [detect, gate_a_prepare]
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true'
    runs-on: ${{ needs.detect.outputs.audit_profile }}
    timeout-minutes: 45
    outputs:
      covered: ${{ steps.plan.outputs.covered }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Decide coverage CHEAPLY (git diff only, no build): leaf proof ⇒ covered,
      # nanoda handles it; non-leaf / global-impact / untrusted ⇒ not covered, the
      # real axiom_audit runs instead. An empty/zero base ⇒ full ⇒ not covered.
      - name: Decide nanoda coverage (no build)
        id: plan
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          set -euo pipefail
          covered=$(BASE_SHA="$BASE_SHA" python3 - <<'PY'
          import os
          from pathlib import Path
          from tools.gate_a.parallel_modules import compute_audit_targets
          base = os.environ.get("BASE_SHA") or None
          if base == "0000000000000000000000000000000000000000":
              base = None
          print("true" if compute_audit_targets(Path("."), base).mode != "full" else "false")
          PY
          )
          echo "covered=$covered" >> "$GITHUB_OUTPUT"
          echo "nanoda coverage: covered=$covered (false ⇒ real axiom_audit runs instead)"

      # --- heavy steps: only when nanoda covers this PR (leaf proof) ---
      - name: Namespace .lake cache volume
        if: steps.plan.outputs.covered == 'true' && needs.detect.outputs.audit_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake
      - name: Fallback restore of library oleans on a cold volume (ADR-045)
        if: steps.plan.outputs.covered == 'true' && needs.detect.outputs.audit_volume == 'true' && steps.ns_lake_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        if: steps.plan.outputs.covered == 'true' && needs.detect.outputs.audit_volume != 'true'
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-
      - name: Build (lean-action, mathlib binary cache)
        if: steps.plan.outputs.covered == 'true'
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          use-github-cache: ${{ needs.detect.outputs.audit_volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"
      - name: Generate statement-binding obligations
        if: steps.plan.outputs.covered == 'true'
        run: python3 -m tools.gate_a.check_statement_binding generate .
      - name: Library build — zero-warning bar (--wfail)
        if: steps.plan.outputs.covered == 'true' && steps.lake_build_cache.outputs.cache-hit != 'true'
        run: lake build UnsorryLibrary --wfail
      # Both checkers are PINNED — lean4export to the lean-toolchain tag, nanoda to
      # NANODA_COMMIT in setup.sh — so the built binaries are identical across every
      # PR until a pin bumps. Cache them keyed on those two pin sources: a hit makes
      # the build step below a ~no-op (setup.sh skips when the binaries exist), so the
      # gate-a-nanoda job drops from ~3 min (cold cargo+lake build) to the ~9 s check.
      # A pin bump changes the hash ⇒ fresh build, so no stale binary can be served.
      # Soundness: the cache cannot admit a bad proof — leanchecker replay still gates
      # every proof at p=1, and the daily full axiom_audit backstop (ADR-048) re-runs
      # the real audit; the cache is repo-scoped + fork-write-protected (#5751, #5678).
      - name: Cache pinned independent-check binaries (lean4export + nanoda)
        if: steps.plan.outputs.covered == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.unsorry/independent-check
          key: indep-check-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'tools/independent_check/setup.sh') }}
      - name: Build independent-check tools (pinned lean4export + nanoda)
        if: steps.plan.outputs.covered == 'true'
        run: |
          set -euo pipefail
          eval "$(./tools/independent_check/setup.sh)"
          { echo "LEAN4EXPORT_BIN=$LEAN4EXPORT_BIN"; echo "NANODA_BIN=$NANODA_BIN"; } >> "$GITHUB_ENV"
      - name: nanoda audit-replacement check (ADR-097)
        if: steps.plan.outputs.covered == 'true'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          set -euo pipefail
          base_arg=()
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then base_arg=(--base "$BASE_SHA"); fi
          # nanoda_gate exits 0 (covered+pass) / 1 (covered+FAIL) / 2 (not-covered).
          # We only reach here when covered, so 2 should not occur; treat anything
          # non-zero as a gate failure (fail-closed).
          python3 -m tools.gate_a.nanoda_gate "${base_arg[@]}" \
            --lean4export-cmd "lake env ${LEAN4EXPORT_BIN}" \
            --nanoda-cmd "${NANODA_BIN}" \
            --output-json nanoda-gate-report.json

  # ADR-063: plan the kernel replay into N disjoint shards. Reads source + the PR
  # diff only (no build), so it's a fast ubuntu job that drives the replay matrix
  # below. count==0 (no changed library module) → empty matrix → the replay job
  # is skipped and gate_a_replay_cover passes vacuously. The shard count N is
  # `vars.UNSORRY_REPLAY_SHARDS` (operator capacity knob, default 8).
  gate_a_replay_plan:
    name: gate-a-replay-plan
    needs: [detect, gate_a_prepare]
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Plan replay shards (ADR-063)
        id: plan
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
          SHARDS: ${{ vars.UNSORRY_REPLAY_SHARDS || '8' }}
          # leanchecker holds ~all of mathlib (~10 GB) resident per process; on a
          # 16 GB runner 30 oleans/invocation (the default) OOMs, and Namespace
          # blocks swapon. Cap the per-invocation peak (mathlib + a few oleans).
          UNSORRY_REPLAY_CHUNK: ${{ vars.UNSORRY_REPLAY_CHUNK || '6' }}
        run: |
          set -euo pipefail
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            out=$(python3 -m tools.gate_a.parallel_modules plan --shards "$SHARDS")
          else
            out=$(python3 -m tools.gate_a.parallel_modules plan --shards "$SHARDS" --base "$BASE_SHA")
          fi
          echo "plan: $out"
          echo "matrix=$(printf '%s' "$out" | python3 -c 'import sys,json;print(json.dumps(json.load(sys.stdin)["shards"]))')" >> "$GITHUB_OUTPUT"
          echo "count=$(printf '%s' "$out" | python3 -c 'import sys,json;print(json.load(sys.stdin)["count"])')" >> "$GITHUB_OUTPUT"

  gate_a_replay:
    name: gate-a-replay
    needs: [detect, gate_a_prepare, gate_a_replay_plan]
    # ADR-063: one matrix leg per shard. Skip when no library module changed
    # (count==0) — the empty matrix would expand to zero legs; the cover job then
    # passes vacuously. Each leg restores gate-a-prepare's oleans and replays its
    # disjoint shard, so every olean is still kernel-replayed exactly once.
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true' && needs.gate_a_replay_plan.outputs.count != '0'
    runs-on: ${{ needs.detect.outputs.replay_profile }}
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.gate_a_replay_plan.outputs.matrix) }}
    # 120m (not 60m): a FULL replay (toolchain/dep change, or the scheduled
    # backstop) is serial on a memory-bound runner and needs the headroom to
    # finish rather than time out (ADR-047). Incremental PR and push-to-main
    # replays finish in seconds (ADR-048 Phase 2). Matches ADR-047/#748.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: restore the library oleans gate-a-prepare just built (exact-key
      # hit on the commit sha) so this job's library build is a near-no-op rather
      # than a third cold ~16-21 min rebuild. See gate-a-prepare for the full
      # rationale and the soundness argument.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.replay_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.replay_volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          if [ "${{ steps.ns_lake_cache.outputs.cache-hit }}" != "true" ]; then
            echo "::warning::Namespace .lake cache MISS on this profile — Gate A cold-builds mathlib + the library (slow, #1921). Check the volume is attached (ADR-046)."
          fi
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # Cold-volume fallback (ADR-045): when the Namespace .lake volume MISSED,
      # RESTORE the library oleans gate-a-prepare published on main so the build
      # below this job needs (to produce the oleans leanchecker replays) is a
      # cheap incremental instead of a cold ~21-min rebuild. Restore ONLY — never
      # writes the cache. Soundness unchanged: the kernel replay re-checks every
      # olean regardless of where it came from.
      - name: Fallback restore of library oleans on a cold volume (ADR-045)
        if: needs.detect.outputs.replay_volume == 'true' && steps.ns_lake_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # GitHub-cache fallback for the local oleans — NON-Namespace only. On a
      # Namespace profile the .lake cache volume (ADR-046) already persists
      # .lake/build across jobs and runs, so this GitHub cache is pure churn there:
      # a ~320 MB per-commit entry (keyed on github.sha) that thrashes the 10 GB
      # repo cache. Gating it to volume!='true' keeps the cache small. On Namespace
      # the warm volume makes audit/replay's library build a cheap incremental
      # instead — the #801 exact-key build-skip just doesn't fire there.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        if: needs.detect.outputs.replay_volume != 'true'
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # Kernel replay (leanchecker) holds ~all of mathlib resident per process;
      # as the library grows its peak RSS crept past the 7 GB standard-runner
      # limit and the replay step took SIGTERM/143 (#370, the euclid recompose —
      # ~4 min in, axiom audit clean, so resource exhaustion not a bad proof).
      # Chunk size does not move the ceiling (the cost is the mathlib image, not
      # the few library oleans in a chunk), so give leanchecker swap to page cold
      # regions instead of OOM. The job uses ~10 of its 60 min, so paging is well
      # within budget. /mnt has tens of GB free on GitHub-hosted ubuntu runners.
      - name: Add swap headroom for leanchecker (best-effort)
        # Best-effort: GitHub-hosted runners allow swapon, so leanchecker pages
        # cold mathlib regions instead of OOMing on a constrained runner.
        # Namespace managed runners disallow swapon ("Operation not permitted");
        # there the incremental scope (routine PRs + push to main, ADR-048 Phase
        # 2) keeps the replay small, and full replay runs on the replay profile
        # with a small UNSORRY_REPLAY_CHUNK available as the fallback path, so
        # any failure in this step is a warning, not a gate failure.
        run: |
          if sudo fallocate -l 12G /mnt/swapfile \
               || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=12288; then
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            if sudo swapon /mnt/swapfile; then
              echo "--- memory after adding swap ---"
              free -h
            else
              echo "::warning::swapon not permitted on this runner — continuing on RAM + serial replay"
              sudo rm -f /mnt/swapfile || true
            fi
          else
            echo "::warning::could not allocate a swapfile — continuing on RAM + serial replay"
          fi

      - name: Build (lean-action, mathlib binary cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.replay_volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      - name: Generate statement-binding obligations
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        # Skip when the .lake/build cache hit on the exact commit-sha key:
        # gate-a-prepare already built and --wfail-checked these exact oleans this
        # run, and the axiom audit / leanchecker only LOAD oleans (`lake exe` /
        # `lake env`, never a library `lake build` — axiom_audit is a standalone
        # lean_exe, leanchecker runs under `lake env`), so rebuilding here was pure
        # waste (~3.5 min/job, the gate's biggest constant cost). Self-healing:
        # on a cache miss the build runs. Soundness unchanged — leanchecker
        # re-checks every olean it loads against the kernel regardless of origin.
        if: steps.lake_build_cache.outputs.cache-hit != 'true'
        run: lake build UnsorryLibrary --wfail

      # Incremental on PRs AND on push to main (ADR-033 + ADR-048 Phase 2):
      # replay only the changed library modules and their reverse-import closure
      # — the rest are byte-identical to and already verified on main. BASE_SHA is
      # github.event.before on a push (the previous main tip — diff = exactly the
      # merged change), pull_request.base.sha on a PR, empty otherwise. A zero-SHA
      # (first push / branch creation) or empty BASE_SHA runs a FULL replay as the
      # backstop; the tool also falls back to full if the diff can't be computed or
      # an olean-invalidating file changed. The scheduled gate-a-full-replay
      # workflow is the defense-in-depth full backstop (ADR-048 Phase 2).
      # Replay is intentionally serial: the tool accepts --jobs for CLI symmetry
      # but reports effective jobs=1. A forced FULL replay routes to the 16 GB
      # profile; on a constrained runner set UNSORRY_REPLAY_CHUNK to a small value
      # (e.g. 6) so leanchecker's per-chunk peak fits (SPEC-048-B).
      - name: Kernel replay shard ${{ matrix.shard }} (leanchecker, ADR-063)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
          SHARDS: ${{ vars.UNSORRY_REPLAY_SHARDS || '8' }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.parallel_modules replay-shard \
              --shard-index ${{ matrix.shard }} --shard-total "$SHARDS"
          else
            python3 -m tools.gate_a.parallel_modules replay-shard \
              --shard-index ${{ matrix.shard }} --shard-total "$SHARDS" --base "$BASE_SHA"
          fi

  # ADR-063: the replay matrix's coverage assert and the single signal the
  # aggregator reads for replay. split_evenly partitions the target set
  # disjoint+covering (unit-tested), so with fail-fast:false the matrix is
  # 'success' only when every leg is green ⟺ every olean replayed exactly once.
  # Fails closed on a planner failure or any non-green shard; passes vacuously
  # when count==0 (no library change → replay matrix skipped).
  gate_a_replay_cover:
    name: gate-a-replay-cover
    needs: [detect, gate_a_replay_plan, gate_a_replay]
    if: always() && needs.detect.outputs.admitted == 'true' && needs.detect.outputs.active == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Assert every shard replayed green
        env:
          COUNT: ${{ needs.gate_a_replay_plan.outputs.count }}
          PLAN_RESULT: ${{ needs.gate_a_replay_plan.result }}
          REPLAY_RESULT: ${{ needs.gate_a_replay.result }}
        run: |
          set -euo pipefail
          if [ "$PLAN_RESULT" != "success" ]; then
            echo "::error::gate-a-replay-plan concluded '$PLAN_RESULT' — cannot trust the shard plan"
            exit 1
          fi
          if [ "$COUNT" = "0" ]; then
            echo "no changed library modules — nothing to replay (matrix skipped)"
            exit 0
          fi
          if [ "$REPLAY_RESULT" != "success" ]; then
            echo "::error::replay matrix result='$REPLAY_RESULT' — a shard failed or was skipped; coverage NOT proven"
            exit 1
          fi
          echo "all $COUNT module(s) replayed across the shards (every olean exactly once)"

  gate_a_archive:
    name: gate-a-archive
    needs: [detect]
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.archive == 'true'
    runs-on: ${{ needs.detect.outputs.archive_profile }}
    # Validates a changed archive package: packaging sanity (`lake build --wfail`)
    # + provenance/byte-identity (ADR-018, checked in gate-a-prepare). It does NOT
    # leanchecker-replay the archived proofs (ADR-048 verify-on-ingest) — they were
    # kernel-verified when active and are byte-identical now — so it no longer needs
    # the 16 GB pin (#838, now superseded) or swap that the replay required (#764).
    # `lake build --wfail` fits the standard runner.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Mount the Namespace volume so the archive packages' `lake exe cache get`
      # finds mathlib .ltar archives in the shared MATHLIB_CACHE_DIR (under .lake)
      # instead of re-downloading per package (ADR-046).
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.archive_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      # Archive packages build their own mathlib, so just install the toolchain.
      - name: Set up Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          build: "false"
          test: "false"
          lint: "false"
          use-mathlib-cache: "false"
          use-github-cache: "false"

      # BASE_SHA mirrors the audit/replay jobs: pull_request.base.sha on a PR,
      # github.event.before on a push to main (validate only archives the push
      # changed — usually a no-op). The zero-SHA (first push / branch creation) or
      # an empty BASE_SHA falls back to validating ALL archive packages, so we
      # never rely on implicit `git diff <zero-sha>` behaviour for a soundness path.
      - name: Validate changed archive packages (ADR-041)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.archive_packages validate-changed
          else
            python3 -m tools.gate_a.archive_packages validate-changed --base "$BASE_SHA"
          fi

  gate_a_benchmark:
    name: gate-a-benchmark
    needs: [detect]
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.benchmark == 'true'
    runs-on: ${{ needs.detect.outputs.archive_profile }}
    # Kernel-verifies a benchmark suite's discharged obligations at the SUITE's own
    # mathlib pin (ADR-099 / SPEC-099-A §2). Each suite verification package
    # (targets/<suite>/_verify) is a self-contained Lake project pinned to the suite's
    # (toolchain, mathlib rev); these proofs were never active in the repo library, so
    # — unlike archive packages — each must be kernel-built here: `lake build --wfail`
    # at the suite pin. Reuses the cheap build lane + the .lake cache volume (the
    # suite's `lake exe cache get` warms the suite pin's mathlib into MATHLIB_CACHE_DIR).
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Namespace .lake cache volume
        if: needs.detect.outputs.archive_volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      # Suite packages build their own (per-pin) mathlib, so just install the toolchain.
      - name: Set up Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          build: "false"
          test: "false"
          lint: "false"
          use-mathlib-cache: "false"
          use-github-cache: "false"

      # BASE_SHA mirrors the archive job; an empty/zero base validates ALL benchmark
      # verification packages (never relies on implicit git-diff-of-zero-sha behaviour).
      - name: Validate changed benchmark suites (ADR-099)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.benchmark_packages validate-changed
          else
            python3 -m tools.gate_a.benchmark_packages validate-changed --base "$BASE_SHA"
          fi

  gate-a:
    needs: [detect, gate_a_prepare, gate_a_nanoda, gate_a_audit_plan, gate_a_audit, gate_a_audit_cover, gate_a_replay_plan, gate_a_replay, gate_a_replay_cover, gate_a_archive, gate_a_benchmark]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate Gate A result
        env:
          LEAN_RELEVANT: ${{ needs.detect.outputs.lean }}
          ACTIVE_RELEVANT: ${{ needs.detect.outputs.active }}
          ADMITTED: ${{ needs.detect.outputs.admitted }}
          PREPARE_RESULT: ${{ needs.gate_a_prepare.result }}
          # ADR-097: nanoda is the leaf-proof audit-replacement (the result is the
          # job itself; `covered` says whether it handled this PR). The real audit
          # below ran only as the fallback when nanoda did NOT cover.
          NANODA_RESULT: ${{ needs.gate_a_nanoda.result }}
          NANODA_COVERED: ${{ needs.gate_a_nanoda.outputs.covered }}
          # ADR-091: the sharded audit's single signal is the cover job, which
          # asserts the plan succeeded + every shard is green (or count==0).
          AUDIT_RESULT: ${{ needs.gate_a_audit_cover.result }}
          # ADR-063: the sharded replay's single signal is the cover job, which
          # asserts the plan succeeded + every shard is green (or count==0).
          REPLAY_RESULT: ${{ needs.gate_a_replay_cover.result }}
          ARCHIVE_RELEVANT: ${{ needs.detect.outputs.archive }}
          ARCHIVE_RESULT: ${{ needs.gate_a_archive.result }}
          # ADR-099: benchmark suite verification at the suite's own mathlib pin.
          BENCHMARK_RELEVANT: ${{ needs.detect.outputs.benchmark }}
          BENCHMARK_RESULT: ${{ needs.gate_a_benchmark.result }}
        run: |
          set -euo pipefail
          if [ "$ADMITTED" != "true" ]; then
            echo "PR is not admitted by queued-proof cutover policy — heavy Gate A passes vacuously while pr-admission closes it."
            exit 0
          fi

          if [ "$LEAN_RELEVANT" != "true" ]; then
            echo "No Lean-relevant paths touched — gate-a passes vacuously."
            exit 0
          fi

          failed=0
          pairs="gate-a-prepare:$PREPARE_RESULT"
          if [ "$ACTIVE_RELEVANT" = "true" ]; then
            # ADR-097: nanoda + replay are ALWAYS required (replay keeps p=1). The
            # real audit is required ONLY when nanoda did not cover this PR — the
            # fallback. Fail-closed: NANODA_COVERED is 'true' only when nanoda
            # actually handled it; anything else (incl. a dead nanoda job → empty)
            # requires the audit, and a dead nanoda job also fails NANODA_RESULT.
            pairs="$pairs gate-a-nanoda:$NANODA_RESULT gate-a-replay:$REPLAY_RESULT"
            if [ "$NANODA_COVERED" != "true" ]; then
              pairs="$pairs gate-a-audit:$AUDIT_RESULT"
            fi
          fi
          if [ "$ARCHIVE_RELEVANT" = "true" ]; then
            pairs="$pairs gate-a-archive:$ARCHIVE_RESULT"
          fi
          if [ "$BENCHMARK_RELEVANT" = "true" ]; then
            pairs="$pairs gate-a-benchmark:$BENCHMARK_RESULT"
          fi

          for pair in $pairs; do
            job="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ]; then
              echo "::error::$job concluded with $result"
              failed=1
            fi
          done
          exit "$failed"
