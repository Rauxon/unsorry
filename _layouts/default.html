<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title | default: "unsorry" }}</title>
  {% seo %}
  <style>
    :root { --fg:#1f2328; --muted:#59636e; --link:#0969da; --border:#d1d9e0; --bg:#ffffff; --code-bg:#f6f8fa; }
    @media (prefers-color-scheme: dark) {
      :root { --fg:#e6edf3; --muted:#9198a1; --link:#4493f8; --border:#3d444d; --bg:#0d1117; --code-bg:#151b23; }
    }
    body {
      color: var(--fg); background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      line-height: 1.6; max-width: 860px; margin: 0 auto; padding: 2.5rem 1.25rem 5rem;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { line-height: 1.25; margin-top: 1.6em; }
    h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    code { background: var(--code-bg); padding: .2em .4em; border-radius: 6px; font-size: 85%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; overflow: auto; }
    pre code { background: none; padding: 0; font-size: 100%; }
    pre.mermaid { background: none; text-align: center; }
    table { border-collapse: collapse; display: block; overflow: auto; }
    th, td { border: 1px solid var(--border); padding: .4em .8em; }
    blockquote { color: var(--muted); border-left: .25em solid var(--border); padding: 0 1em; margin-left: 0; }
    img { max-width: 100%; }
  </style>
</head>
<body>
  {{ content }}

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    // kramdown emits ```mermaid fences as <pre><code class="language-mermaid">.
    // Mermaid's auto-run wants <pre class="mermaid">, so rewrite first.
    document.querySelectorAll("pre > code.language-mermaid").forEach((code) => {
      const pre = document.createElement("pre");
      pre.className = "mermaid";
      pre.textContent = code.textContent;
      code.parentElement.replaceWith(pre);
    });

    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    mermaid.initialize({ startOnLoad: false, theme: dark ? "dark" : "default", securityLevel: "loose" });
    await mermaid.run({ querySelector: "pre.mermaid" });
  </script>
</body>
</html>
