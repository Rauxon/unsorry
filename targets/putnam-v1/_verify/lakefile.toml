name = "putnamV1"
version = "0.1.0"
keywords = ["math", "benchmark", "unsorry"]
defaultTargets = ["PutnamV1"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "a3a10db0e9d66acbebf76c5e6a135066525ac900"

[[lean_lib]]
name = "PutnamV1"
srcDir = "library"
globs = ["Unsorry.+"]
